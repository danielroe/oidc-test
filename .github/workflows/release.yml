name: release

on:
  push:
    tags:
      - "v*"
  pull_request_target:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs
permissions: {}

jobs:
  tag-and-release:
    # Squash-merged PR from a v* branch: tag the squash commit, create GH
    # release from PR body, then dispatch the publish job. We don't publish
    # here because pull_request_target's OIDC claims don't match npm's
    # trusted publisher matcher.
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'v')
    concurrency:
      group: release-tag
    permissions:
      contents: write
      actions: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: 🏷️ Create and push tag
        env:
          TAG_NAME: v${{ steps.pkg.outputs.version }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: 🛳️ Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v${{ steps.pkg.outputs.version }}
          BODY: ${{ github.event.pull_request.body }}
        run: gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "$BODY"

      - name: 🚀 Dispatch publish workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: v${{ steps.pkg.outputs.version }}
        run: gh workflow run release.yml --ref "$TAG_NAME"

  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: release-publish
    permissions:
      contents: read
      id-token: write
    environment: npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - run: corepack enable
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: latest
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: 📦 Pack with pnpm (resolves catalog specifiers)
        run: pnpm pack --pack-destination .

      - name: 📤 Stage publish
        run: npm stage publish ./encanto-*.tgz --provenance --access public
