name: release

on:
  push:
    tags:
      - "v*"
  pull_request_target:
    types: [closed]
    branches:
      - main

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs
permissions: {}

jobs:
  release:
    if: >-
      github.event_name == 'push' ||
      (github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'v'))
    concurrency:
      group: release
    permissions:
      contents: write
      id-token: write
    environment: npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}

      - run: corepack enable
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: latest
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: 📦 Pack with pnpm (resolves catalog: specifiers)
        run: pnpm pack --pack-destination .

      - name: 📤 Stage publish
        run: npm stage publish ./encanto-*.tgz --provenance --access public

      - name: 🏷️ Create tag
        if: github.event_name == 'pull_request_target'
        env:
          TAG_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: 🛳️ Create GitHub release
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.pull_request.head.ref }}
          BODY: ${{ github.event.pull_request.body }}
        run: gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "$BODY"
